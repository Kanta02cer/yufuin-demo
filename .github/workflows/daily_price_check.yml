name: Daily Price Check

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  price-check:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run price check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Upload debug HTML (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-${{ github.run_id }}
          path: data/debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push results
        run: |
          git config user.name "price-monitor[bot]"
          git config user.email "price-monitor@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: price update $(date +'%Y-%m-%d')"
          git push origin HEAD

  deploy-pages:
    needs: price-check
    runs-on: ubuntu-22.04
    if: always()
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
